version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: openprep_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - openprep_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: openprep_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/openprep
      - JWT_SECRET=supersecret_openprep_key
      - GEMINI_API_KEY=your_gemini_api_key_here
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - openprep_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: openprep_client
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - openprep_net

volumes:
  mongo_data:

networks:
  openprep_net:
    driver: bridge
