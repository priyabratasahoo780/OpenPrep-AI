name: 📚 Documentation Request
description: Suggest improvements or report errors in the OpenPrep AI documentation
title: "[DOCS]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us make our docs clearer and more complete!
  - type: checkboxes
    id: areas
    attributes:
      label: Affected Areas
      description: Select one or more areas that this documentation request affects.
      options:
        - label: Frontend
        - label: Backend
        - label: Database
        - label: AI
        - label: Authentication
        - label: PYQ Analysis
        - label: Study Planner
        - label: Dashboard
        - label: UI/UX
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: What needs changes?
      description: Link to doc pages or clarify what guide is confusing/missing.
      placeholder: Describe what needs documentation or correction...
    validations:
      required: true
  - type: textarea
    id: changes
    attributes:
      label: Suggested Changes
      description: Write down your suggested wording or draft layout of the requested document.
      placeholder: What details should be added or updated?
    validations:
      required: true
  - type: checkboxes
    id: checklists
    attributes:
      label: Code of Conduct Checklist
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
