name: Duplicate PR Detection

on:
  pull_request_target:
    types: [opened, reopened]

concurrency:
  group: duplicate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  detect-duplicate-pr:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.user.login != 'github-actions[bot]' && github.event.pull_request.user.login != 'dependabot[bot]' }}
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const num = pr.number;
            const body = pr.body || '';

            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'duplicate-pr' });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner, repo, name: 'duplicate-pr', color: 'cfd3d7',
                  description: 'Duplicate PR — another PR targets the same issue',
                });
              }
            }

            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;
            const linked = [...new Set([...body.matchAll(pattern)].map(m => parseInt(m[1])))];

            if (linked.length === 0) {
              console.log('PR #' + num + ' has no linked issues — skipping duplicate check');
              return;
            }

            const duplicates = [];

            for (const issueNum of linked) {
              const { data: results } = await github.rest.search.issuesAndPullRequests({
                q: 'repo:' + owner + '/' + repo + ' is:pr is:open Closes #' + issueNum,
              });

              for (const item of results.items) {
                if (item.number !== num) {
                  duplicates.push({ pr: item.number, issue: issueNum, title: item.title });
                }
              }
            }

            if (duplicates.length === 0) {
              console.log('No duplicate PRs found for #' + num);
              return;
            }

            await github.rest.issues.addLabels({ owner, repo, issue_number: num, labels: ['duplicate-pr'] });

            const list = duplicates
              .map(d => '- PR #' + d.pr + ': **' + d.title + '** (also targets issue #' + d.issue + ')')
              .join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: num,
              body: '## ⚠️ Possible Duplicate PR\n\nHey @' + pr.user.login +
                '! Another open PR already targets the same linked issue(s):\n\n' + list +
                '\n\nPlease check the original PR before proceeding. ' +
                'If this is not a duplicate, a maintainer will remove the `duplicate-pr` label.',
            });
